name: tomcat_deploy
on:
  - push

jobs:
  build_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Listing the code
        run: ls

      - name: Installing Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Artifact
        run: mvn clean package

      - name: Listing WAR file
        run: ls -lR

      - name: Uploading WAR file
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: ./target/*.war

  deploy_job:
    needs: build_job
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: my-artifact
          path: /opt/target

      - name: Verifying WAR file
        run: ls -lR /opt/target

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Upload to s3
        run:  aws s3 cp /opt/target/*.war s3://jenkins-netflix-project/backup/
    
      - name: Download WAR from S3
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws_region: us-east-1
          aws_bucket: jenkins-netflix-project
          source: backup/*.war
          target: /opt/target

      - name: listing the war file
        run: ls -l /opt/target
 
      - name: deploying to tomcat
        run: curl -u admin:admin --upload-file /opt/target/*.war "http://100.49.239.218:8080/manager/text/deploy?path=/NETFLIX&update=true"

      - name: Slack Notification (Success)
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"✅ Deployment Successful 🚀"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Slack Notification (Failure)
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"❌ Deployment Failed 💥"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}
              
            

    
